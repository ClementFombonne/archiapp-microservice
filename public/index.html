<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messageez</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-clair">
    <div id="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="app-wrapper">
        <header>
            <h1>Messageez</h1>
            <button id="theme-toggle" class="btn-icon" title="Changer le thème">🌓</button>
        </header>

        <main>
            <section id="messages-section" class="glass-panel">
                <div class="section-header">
                    <h2>Derniers Messages</h2>
                    <button id="update-btn" class="btn-primary">Mettre à jour</button>
                </div>
                <ul id="message-list">
                    <li>Chargement des messages...</li>
                </ul>
            </section>

            <section id="post-section" class="glass-panel">
                <h2>Poster un message</h2>
                <div class="input-group">
                    <label for="pseudo">Pseudo</label>
                    <input type="text" id="pseudo" placeholder="Votre pseudo...">
                </div>

                <div class="input-group">
                    <label for="new-message">Message</label>
                    <textarea id="new-message" rows="4" placeholder="Écrivez votre message ici..."></textarea>
                </div>

                <button id="send-btn" class="btn-primary">Envoyer</button>
            </section>
        </main>
        <button id="scroll-to-top" title="Remonter en haut">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
        </button>
        <footer>
            <a href="https://github.com/ClementFombonne/archiapp-microservice" target="_blank" rel="noopener noreferrer">
                Le code source est disponible sur GitHub
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
