<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messageez</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-clair">
    <div id="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="app-wrapper">
        <header>
            <h1>Messageez</h1>
            <button id="theme-toggle" class="btn-icon" title="Changer le thème">🌓</button>
        </header>

        <main>
            <section id="messages-section" class="glass-panel">
                <div class="section-header">
                    <h2>Derniers Messages</h2>
                    <button id="update-btn" class="btn-primary">Mettre à jour</button>
                </div>
                <ul id="message-list">
                    <li>Chargement des messages...</li>
                </ul>
            </section>

            <section id="post-section" class="glass-panel">
                <h2>Poster un message</h2>
                <div class="input-group">
                    <label for="pseudo">Pseudo</label>
                    <input type="text" id="pseudo" placeholder="Votre pseudo...">
                </div>
                
                <div class="input-group">
                    <label for="new-message">Message</label>
                    <textarea id="new-message" rows="4" placeholder="Écrivez votre message ici..."></textarea>
                </div>
                
                <button id="send-btn" class="btn-primary">Envoyer</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
